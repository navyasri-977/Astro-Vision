<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AstroVision - Login</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background-image: url('https://images.unsplash.com/photo-1506318137071-a8e063b4bec0?w=1400');
            background-size: cover;
            background-position: center;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-box {
            background: rgba(10, 5, 30, 0.85);
            border: 1px solid #4a2d8a;
            border-radius: 12px;
            padding: 40px;
            width: 380px;
        }

        .login-box h2 {
            font-family: 'Orbitron', sans-serif;
            color: #c084fc;
            text-align: center;
            margin-bottom: 6px;
            letter-spacing: 2px;
        }

        .login-box p {
            text-align: center;
            color: #9d8ec4;
            font-size: 13px;
            margin-bottom: 24px;
        }

        .tab-row {
            display: flex;
            margin-bottom: 20px;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #4a2d8a;
        }

        .tab {
            flex: 1;
            padding: 9px;
            text-align: center;
            cursor: pointer;
            color: #9d8ec4;
            font-size: 13px;
            background: transparent;
            border: none;
            font-family: inherit;
        }

        .tab.active {
            background: #6d28d9;
            color: #fff;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            color: #9d8ec4;
            font-size: 12px;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-group input {
            width: 100%;
            padding: 10px 12px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid #4a2d8a;
            border-radius: 8px;
            color: #e2d9f3;
            font-size: 14px;
            font-family: inherit;
            outline: none;
        }

        .form-group input:focus {
            border-color: #a855f7;
        }

        .radio-row {
            display: flex;
            gap: 16px;
            margin-bottom: 16px;
        }

        .radio-row label {
            color: #9d8ec4;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .err {
            color: #f87171;
            font-size: 12px;
            margin-top: 4px;
            display: none;
        }

        .btn-submit {
            width: 100%;
            padding: 12px;
            background: #6d28d9;
            border: none;
            border-radius: 8px;
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            font-size: 13px;
            letter-spacing: 1px;
            cursor: pointer;
        }

        .btn-submit:hover {
            background: #7c3aed;
        }

        .switch-link {
            text-align: center;
            margin-top: 14px;
            color: #9d8ec4;
            font-size: 13px;
        }

        .switch-link a {
            color: #c084fc;
            cursor: pointer;
        }

        .msg {
            display: none;
            text-align: center;
            padding: 12px;
            background: rgba(109, 40, 217, 0.2);
            border: 1px solid #6d28d9;
            border-radius: 8px;
            color: #c084fc;
            font-size: 13px;
            margin-bottom: 14px;
        }
    </style>
</head>

<body>
    <div class="login-box">
        <h2>ASTROVISION</h2>
        <p>Your gateway to the cosmos</p>
        <div id="msg" class="msg"></div>
        <div class="tab-row">
            <button class="tab active" onclick="switchTab('login')">SIGN IN</button>
            <button class="tab" onclick="switchTab('signup')">SIGN UP</button>
        </div>

        <div id="login-form">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="l-user" placeholder="Enter username">
                <div class="err" id="l-user-err">Username is required</div>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="l-pass" placeholder="Enter password">
                <div class="err" id="l-pass-err">Password is required</div>
            </div>
            <div class="radio-row">
                <label><input type="radio" name="loc" value="earth" checked> Earth</label>
                <label><input type="radio" name="loc" value="mars"> Mars Base</label>
                <label><input type="radio" name="loc" value="orbit"> Orbit</label>
            </div>
            <button class="btn-submit" onclick="handleLogin()">SIGN IN</button>
            <div class="switch-link">No account? <a onclick="switchTab('signup')">Sign up</a></div>
        </div>

        <div id="signup-form" style="display:none">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="s-name" placeholder="Your name">
                <div class="err" id="s-name-err">Name is required</div>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="s-email" placeholder="you@space.com">
                <div class="err" id="s-email-err">Valid email required</div>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="s-pass" placeholder="Min 8 characters">
                <div class="err" id="s-pass-err">Min 8 characters required</div>
            </div>
            <button class="btn-submit" onclick="handleSignup()">CREATE ACCOUNT</button>
            <div class="switch-link">Have an account? <a onclick="switchTab('login')">Sign in</a></div>
        </div>
    </div>

    <script>
        function switchTab(t) {
            document.getElementById('login-form').style.display = t === 'login' ? 'block' : 'none';
            document.getElementById('signup-form').style.display = t === 'signup' ? 'block' : 'none';
            document.querySelectorAll('.tab').forEach((b, i) => b.classList.toggle('active', (i === 0) === (t === 'login')));
            document.getElementById('msg').style.display = 'none';
        }
        function show(id, v) { document.getElementById(id).style.display = v ? 'block' : 'none'; }
        function handleLogin() {
            const u = document.getElementById('l-user').value.trim();
            const p = document.getElementById('l-pass').value.trim();
            show('l-user-err', !u); show('l-pass-err', !p);
            if (u && p) { const m = document.getElementById('msg'); m.textContent = 'Welcome back! Redirecting...'; m.style.display = 'block'; setTimeout(() => window.location.href = 'index.html', 1500); }
        }
        function handleSignup() {
            const n = document.getElementById('s-name').value.trim();
            const e = document.getElementById('s-email').value.trim();
            const p = document.getElementById('s-pass').value.trim();
            show('s-name-err', !n); show('s-email-err', !e || !e.includes('@')); show('s-pass-err', p.length < 8);
            if (n && e.includes('@') && p.length >= 8) { const m = document.getElementById('msg'); m.textContent = 'Account created! Welcome, ' + n + '!'; m.style.display = 'block'; setTimeout(() => window.location.href = 'index.html', 1500); }
        }
    </script>
</body>

</html>
